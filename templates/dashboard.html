{% extends 'base.html' %}

{% block body %}
<div class="dashboard-container">
    <h1>Личный кабинет</h1>

    <div class="welcome-message">
        <h2>Добро пожаловать, {{ username }}!</h2>
        <p>Вы успешно вошли в систему.</p>
    </div>

    <div class="dashboard-menu">
        <ul>
            <li><a href="/">Главная</a></li>
            <li><a href="/dashboard">Профиль</a></li>
            <li><a href="/ai">ИИ</a></li>
            <li><a href="{{ url_for('logout') }}">Выйти</a></li>
        </ul>
    </div>

    <div class="dashboard-content">
        <h3>Ваши данные:</h3>
        <p>Имя пользователя <strong>{{ username }}</strong></p>
    </div>
</div>
<style>
    html, body {
        background-color: #D3D3D3;
        font-family: 'Courier New', 'JetBrains Mono', monospace;
        min-height: 100vh;
    }
    .dashboard-container {
        max-width: 600px;
        margin: 50px auto;
        padding: 40px;
        background-color: #D3D3D3;
        border: 1px solid #2a3a4a;
        border-radius: 8px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.7);
    }
    h1 {
        color: #000000;
        font-size: 28px;
        font-weight: 400;
        margin-bottom: 35px;
        padding-bottom: 12px;
        border-bottom: 1px solid #2a3a4a;
        font-family: 'Courier New', monospace;
        position: relative;
    }
    .welcome-message {
        max-width: 600px;
        margin: 50px auto;
        padding: 40px;
        background-color: #D3D3D3;
        border: 1px solid #2a3a4a;
        border-radius: 8px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.7);
    }
    h2 {
        color: #000000;
        font-size: 28px;
        font-weight: 400;
        margin-bottom: 35px;
        padding-bottom: 12px;
        border-bottom: 1px solid #2a3a4a;
        font-family: 'Courier New', monospace;
        position: relative;
    }
    p {
        color: #000000;
        font-size: 28px;
        font-weight: 400;
        margin-bottom: 35px;
        padding-bottom: 12px;
        border-bottom: 1px solid #2a3a4a;
        font-family: 'Courier New', monospace;
        position: relative;
    }

    .dashboard-menu {
        max-width: 600px;
        margin: 50px auto;
        padding: 40px;
        background-color: #D3D3D3;
        border: 1px solid #2a3a4a;
        border-radius: 8px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.7);
    }

    ul {
        list-style: none;
        display: flex;
        gap: 30px;
        margin: 0;
        padding: 0;
        justify-content: center;
    }

    li a {
        text-decoration: none;
        color: black;
        font-weight: 600;
        padding: 10px 18px;
        border-radius: 8px;
        border: 5px solid #e6b8af;
        transition: all 0.3s ease;
        font-family: 'Segoe UI', system-ui, sans-serif;
    }

    li a:hover {
        background: rgba(255,255,255,0.2);
        transform: translateY(-2px);
    }


    li a.active {
        background: #1abc9c;
    }
</style>
{% endblock %}
