<!doctype html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>{% block title %}ФактЧекер{% endblock %}</title>
</head>
<body>
    <div class="container">
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                <div class="flash-messages">
                    {% for category, message in messages %}
                        <div class="alert alert-{{ category if category != 'message' else 'info' }}">
                            {{ message }}
                        </div>
                    {% endfor %}
                </div>
            {% endif %}
        {% endwith %}
        {% block body %}{% endblock %}
        <div class="settings-mt">
    <button class="theme-btn" data-theme="light">Светлая</button>
    <button class="theme-btn" data-theme="dark">Темная</button>
    <button class="theme-btn" data-theme="blue">Синяя</button>
    <button class="theme-btn" data-theme="gray">Серая</button>
</div>
<style>

:root {
    --bg-color: #ffffff;
    --text-color: #333333;
    --primary-color: #007bff;
}


[data-theme="dark"] {
    --bg-color: #1a1a1a;
    --text-color: #f0f0f0;
    --primary-color: #bb86fc;
}


[data-theme="blue"] {
    --bg-color: #e6f0ff;
    --text-color: #003366;
    --primary-color: #0044cc;
}

[data-theme="gray"] {
    --bg-color: #F3F3F3;
    --text-color: #003366;
    --primary-color: #0044cc;
}


body {
    background-color: var(--bg-color);
    color: var(--text-color);
    transition: background-color 0.3s ease, color 0.3s ease;
}

.button-primary {
    background-color: var(--primary-color);
}
</style>
<script>
    function setTheme(themeName) {
    document.documentElement.setAttribute('data-theme', themeName);
    localStorage.setItem('theme', themeName);
}

function getInitialTheme() {
    const savedTheme = localStorage.getItem('theme');
    if (savedTheme) {
        return savedTheme;
    }
    const systemPrefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    if (systemPrefersDark) {
        return 'gray';
    }
    return 'light';
}


const initialTheme = getInitialTheme();
setTheme(initialTheme);


document.querySelectorAll('.theme-btn').forEach(btn => {
    btn.addEventListener('click', () => {
        const theme = btn.getAttribute('data-theme');
        setTheme(theme);
    });
});
</script>
    </div>
</body>
</html>
