{% extends 'base.html' %}

{% block title %}
Регистрация
{% endblock %}

{% block body %}
    <form method="POST" action="{{ url_for('auto') }}" class="register-form">
        <div class="container mt-5">
            <h1>Регистрация</h1>
            <input type="text" name="login" id="login" class="form-control" placeholder="Введите логин"><br>
            <input type="text" name="password" id="password" class="form-control" placeholder="Введите пароль"><br>
            <button type="submit" class="btn-register" id="submit-btn"><i class="fas fa-user-plus"></i> Зарегистрироваться</button>
            <a href="{{ url_for('login') }}" class="register-link"><i class="fas fa-home"></i>Вход</a>
        </div>
    </form>
{% endblock %}
